# Netlify build configuration for the Astro (Sanctuary) site.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Astro 6 requires Node >= 22.12. Pin so Netlify doesn't build with an older default
  # (an older Node makes `astro build` fail -> nothing publishes -> 404).
  NODE_VERSION = "22"

  # These env vars are PUBLIC by design (PUBLIC_ prefix = shipped to the browser; the
  # Firebase web config + Razorpay key_id are public identifiers, not secrets). Exclude
  # them from Netlify's secrets scanner, which otherwise trips on the project id ("jaindisha")
  # appearing legitimately across the repo (package.json, URLs, sitemap). The genuinely secret
  # vars (FIREBASE_SERVICE_ACCOUNT_B64, RAZORPAY_KEY_SECRET, CALCOM_API_KEY, *_WEBHOOK_SECRET,
  # ALLOWED_ADMIN_EMAIL) are NOT listed here, so they remain scanned.
  SECRETS_SCAN_OMIT_KEYS = "PUBLIC_FIREBASE_API_KEY,PUBLIC_FIREBASE_AUTH_DOMAIN,PUBLIC_FIREBASE_PROJECT_ID,PUBLIC_FIREBASE_APP_ID,PUBLIC_RAZORPAY_KEY_ID"
